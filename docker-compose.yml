services:
  postgres:
    image: postgres:16-alpine
    container_name: akonet-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: akonet
    ports:
      - "5432:5432"
    volumes:
      - akonet_pg:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d akonet"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akonet-backend
    environment:
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/akonet
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-REDACTED_TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-REDACTED_TWITCH_CLIENT_SECRET}
      TWITCH_REDIRECT_URI: ${TWITCH_REDIRECT_URI:-http://localhost:3000/auth/twitch/callback}
      FRONTEND_OAUTH_REDIRECT: ${FRONTEND_OAUTH_REDIRECT:-http://localhost:5173/auth/twitch/callback}
    ports:
      - "3000:3000"
    volumes:
      - akonet_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  akonet_pg:
  akonet_uploads:
