services:
  postgres:
    image: postgres:16-alpine
    container_name: akonet-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: akonet
    ports:
      - "5432:5432"
    volumes:
      - akonet_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d akonet"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akonet-backend
    environment:
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/akonet
      REDIS_URL: redis://redis:6379
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-akonet}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://localhost:9000/akonet}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-i58yfqn5zmbvf6ks1uw7kjyblrddjl}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-2xawdqo0kp0j4sqfugq6ewi6006lu7}
      TWITCH_REDIRECT_URI: ${TWITCH_REDIRECT_URI:-http://localhost:3000/auth/twitch/callback}
      FRONTEND_OAUTH_REDIRECT: ${FRONTEND_OAUTH_REDIRECT:-http://localhost:5173/auth/twitch/callback}
    ports:
      - "3000:3000"
    volumes:
      - akonet_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: akonet-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: akonet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - akonet_minio:/data

volumes:
  akonet_pg:
  akonet_uploads:
  akonet_minio:
