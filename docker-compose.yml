services:
  postgres:
    image: postgres:16-alpine
    container_name: nexora-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: nexora
    ports:
      - "5432:5432"
    volumes:
      - nexora_pg:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexora"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexora-backend
    environment:
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/nexora
    ports:
      - "3000:3000"
    volumes:
      - nexora_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  nexora_pg:
  nexora_uploads:
