# Static SPA (AkoeNet frontend). REQUIRED for deep links (/invite/..., /server/...) to load index.html.
# Si el servicio se creó a mano en Render: Dashboard → Static Site → Redirects/Rewrites →
#   Source: /*   Destination: /index.html   Action: Rewrite (200).
# Los enlaces de invitación compartibles usan /?invite=TOKEN (siempre sirve /).
# El frontend en Render usa HashRouter por defecto (#/rutas) para evitar 404 en /server/1, etc.
# Opcional: rewrite /* → /index.html + VITE_USE_HASH_ROUTER=false en build para URLs sin #.
# Blueprint opcional: si ya existe el servicio, sincroniza estas reglas con el panel.
services:
  - type: web
    name: akoenet-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Vite inyecta VITE_* en build time: defínelas aquí o en Dashboard → Environment.
    envVars:
      - key: VITE_DESKTOP_INSTALLER_URL
        value: /releases/akonet-desktop.exe
    routes:
      - type: redirect
        source: /favicon.ico
        destination: /favicon.svg
      - type: rewrite
        source: /*
        destination: /index.html
