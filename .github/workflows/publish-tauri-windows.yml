# =============================================================================
# Publicar instalador Windows (NSIS) + firmas + latest.json en GitHub Releases
# =============================================================================
#
# Flujo recomendado (cada release de escritorio):
#   1. Sube la versión en:
#        frontend/package.json  → "version": "0.8.0"
#        frontend/src-tauri/tauri.conf.json → "version": "0.8.0"
#        frontend/src-tauri/Cargo.toml → version = "0.8.0"
#      (deben coincidir entre sí y con el tag.)
#   2. Commit y push a la rama habitual (p. ej. Development o main).
#   3. Crea y sube el tag:
#        git tag v0.8.0
#        git push origin v0.8.0
#
# Este workflow se dispara solo con tags que empiezan por "v". Compila en
# windows-latest y tauri-action sube el .exe, .sig y latest.json al Release.
#
# Secretos en GitHub: Settings → Secrets and variables → Actions
#   TAURI_SIGNING_PRIVATE_KEY — fichero .key completo (multilínea) o la línea base64 de `tauri signer generate`
#     (el script tauri-with-cargo-path.mjs adapta el formato al que espera el CLI de Tauri)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — solo si la .key está cifrada; debe coincidir exactamente.
#     Si usas clave *sin* contraseña: elimina este secreto del repo (no lo dejes creado vacío: puede fallar el build).
#     Error típico: "Wrong password for that key" → contraseña distinta o secreto mal pegado en GitHub.
#
# Permisos (obligatorio si ves "Resource not accessible by integration" al crear el Release):
#   Repo: Settings → Actions → General → Workflow permissions →
#   "Read and write permissions" + guardar.
#   En organizaciones: el admin debe permitir que los workflows escriban en el repo.
#
# Si tras eso sigue fallando (p. ej. ruleset o política de org): crea un secreto opcional
#   GH_RELEASE_TOKEN — PAT clásico con scope "repo", o fine-grained con Contents: Read and write.
#   El workflow usa ese token para tauri-action y gh release upload si el secreto existe.
#
# Aviso Tauri "updater secret key does not match pubkey": el secreto TAURI_SIGNING_PRIVATE_KEY
# no es el par de plugins.updater.pubkey en tauri.conf.json. Genera la línea correcta con:
#   cd frontend && npm run updater:pubkey-for-conf -- "%USERPROFILE%\.tauri\tu.key.pub"
#   y sustituye pubkey en src-tauri/tauri.conf.json; o alinea el secreto en GitHub con esa pubkey.
#
# Tras el job: el instalador está en el Release y también como nombre estable:
#   …/releases/latest/download/akonet-desktop.exe
# (mismo NSIS que AkoeNet_X.Y.Z_x64-setup.exe). Render puede hacer curl de esa URL al build.
#
# Referencia: https://github.com/tauri-apps/tauri-action
#
# Rutas tipo D:\a\NOMBRE_ORG\NOMBRE_REPO\... : carpeta de trabajo del runner Windows en
# GitHub Actions (clone del repo); no es tu disco local.
# =============================================================================

name: Publish desktop (Windows)

on:
  push:
    tags:
      - 'v*'

# Permisos del workflow (el job repite contents: write por claridad con algunas acciones).
permissions:
  contents: write

# Mismo tag re-empujado mientras el job anterior sigue en marcha: con cancel-in-progress: true
# el nuevo run cancelaba el anterior (p. ej. durante rust-toolchain) → "The operation was canceled".
concurrency:
  group: publish-tauri-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # Usar el commit del evento (github.sha) para que el job use el mismo árbol que el tag,
      # no una shallow/default que en algunos casos no coincide con el tag empujado.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Tauri `sign_updaters` lee `TAURI_SIGNING_PRIVATE_KEY` y hace base64-decode; si además
      # apunta a un fichero, lee el texto tal cual (un .key multilínea en claro NO sirve ahí).
      # Normalizamos aquí (mismo criterio que `tauri-with-cargo-path.mjs`) y exportamos a GITHUB_ENV.
      - name: Exportar clave de firma normalizada para el build
        working-directory: frontend
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::Falta el secreto TAURI_SIGNING_PRIVATE_KEY. Settings → Secrets and variables → Actions."
            exit 1
          fi
          node scripts/ci-export-tauri-signing-key.mjs

      - name: Comprobar que el tag coincide con package.json, tauri.conf y Cargo.toml
        working-directory: frontend
        env:
          TAG: ${{ github.ref_name }}
        run: node scripts/verify-tauri-release-version.mjs

      # Pasar el token por GITHUB_OUTPUT + add-mask: el contexto env.* no incluye GITHUB_ENV,
      # y así tauri-action y gh reciben explícitamente el mismo valor (PAT o github.token).
      - id: release_token
        name: Token para API de Releases (GH_RELEASE_TOKEN o github.token)
        shell: bash
        env:
          GH_RELEASE_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -n "${GH_RELEASE_TOKEN:-}" ]; then
            tok=$(printf '%s' "$GH_RELEASE_TOKEN" | tr -d '\r\n')
            echo "Usando GH_RELEASE_TOKEN (PAT) para crear/subir el release."
          else
            tok="$FALLBACK_TOKEN"
            echo "Usando github.token. Si falla 'Resource not accessible', define GH_RELEASE_TOKEN (PAT con repo) o Workflow permissions → Read and write en el repo/org."
          fi
          if [ -z "$tok" ]; then echo "::error::No hay token para GitHub."; exit 1; fi
          echo "::add-mask::$tok"
          echo "token=$tok" >> "$GITHUB_OUTPUT"

      - name: Build Tauri and upload release + latest.json
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ steps.release_token.outputs.token }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          # Debe coincidir con el script en package.json ("tauri": "node …"). No incluir "build" aquí.
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: AkoeNet ${{ github.ref_name }}
          releaseBody: |
            Instalador NSIS Windows y `latest.json` para actualizaciones automáticas (Tauri updater).

            Descarga el `.exe` desde los assets de abajo. La app instalada comprobará actualizaciones según `tauri.conf.json`.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Subir alias estable akonet-desktop.exe (mismo binario, URL fija /latest/download/)
        working-directory: frontend
        env:
          GH_TOKEN: ${{ steps.release_token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.release_token.outputs.token }}
        shell: pwsh
        run: |
          $nsis = "src-tauri/target/release/bundle/nsis"
          if (-not (Test-Path $nsis)) { throw "No existe bundle/nsis: $nsis" }
          $items = Get-ChildItem -Path $nsis -File -Filter "*_x64-setup.exe" | Where-Object { $_.Name -notmatch 'uninstall' }
          if ($items.Count -eq 0) { throw "No se encontró *_x64-setup.exe en nsis" }
          $best = $items | ForEach-Object {
            if ($_.Name -match '_(\d+)\.(\d+)\.(\d+)_') {
              [PSCustomObject]@{
                File = $_
                M = [int]$Matches[1]; N = [int]$Matches[2]; P = [int]$Matches[3]
              }
            }
          } | Sort-Object M, N, P -Descending | Select-Object -First 1
          if (-not $best) { throw "No se pudo parsear semver en los nombres de nsis" }
          Copy-Item -LiteralPath $best.File.FullName -Destination "akonet-desktop.exe" -Force
          Write-Host "Alias desde $($best.File.Name) -> akonet-desktop.exe"
          gh release upload "${{ github.ref_name }}" "akonet-desktop.exe" --clobber
