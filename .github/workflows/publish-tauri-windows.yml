# =============================================================================
# Publicar instalador Windows (NSIS) + firmas + latest.json en GitHub Releases
# =============================================================================
#
# Flujo recomendado (cada release de escritorio):
#   1. Sube la versión en:
#        frontend/package.json  → "version": "0.8.0"
#        frontend/src-tauri/tauri.conf.json → "version": "0.8.0"
#        frontend/src-tauri/Cargo.toml → version = "0.8.0"
#      (deben coincidir entre sí y con el tag.)
#   2. Commit y push a la rama habitual (p. ej. Development o main).
#   3. Crea y sube el tag:
#        git tag v0.8.0
#        git push origin v0.8.0
#
# Este workflow se dispara solo con tags que empiezan por "v". Compila en
# windows-latest y tauri-action sube el .exe, .sig y latest.json al Release.
#
# Secretos en GitHub: Settings → Secrets and variables → Actions
#   TAURI_SIGNING_PRIVATE_KEY — fichero .key completo (multilínea) o la línea base64 de `tauri signer generate`
#     (el script tauri-with-cargo-path.mjs adapta el formato al que espera el CLI de Tauri)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — obligatorio si generaste la .key *con* contraseña; debe coincidir
#     exactamente (sin comillas de más). Si la clave es *sin* contraseña, no definas este secreto o déjalo vacío.
#     Error típico: "Wrong password for that key" → contraseña distinta o secreto mal pegado en GitHub.
#
# Permisos: Settings → Actions → General → Workflow permissions →
#   "Read and write permissions" (para que GITHUB_TOKEN cree el Release).
#
# Tras el job: el instalador está en el Release y también como nombre estable:
#   …/releases/latest/download/akonet-desktop.exe
# (mismo NSIS que AkoeNet_X.Y.Z_x64-setup.exe). Render puede hacer curl de esa URL al build.
#
# Referencia: https://github.com/tauri-apps/tauri-action
# =============================================================================

name: Publish desktop (Windows)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Mismo tag re-empujado mientras el job anterior sigue en marcha: con cancel-in-progress: true
# el nuevo run cancelaba el anterior (p. ej. durante rust-toolchain) → "The operation was canceled".
concurrency:
  group: publish-tauri-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    runs-on: windows-latest

    steps:
      # Usar el commit del evento (github.sha) para que el job use el mismo árbol que el tag,
      # no una shallow/default que en algunos casos no coincide con el tag empujado.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Escribir el secreto en un fichero y usar solo TAURI_SIGNING_PRIVATE_KEY_PATH en el build.
      # Pasar la clave multilínea solo por variable de entorno en Windows a veces la trunca o corrompe
      # → Tauri: "failed to decode base64 ... Invalid padding".
      - name: Preparar clave de firma (fichero temporal)
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::Falta el secreto TAURI_SIGNING_PRIVATE_KEY. Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$KEY" > "${RUNNER_TEMP}/tauri-signing.key"

      - name: Comprobar que el tag coincide con package.json, tauri.conf y Cargo.toml
        working-directory: frontend
        env:
          TAG: ${{ github.ref_name }}
        run: node scripts/verify-tauri-release-version.mjs

      - name: Build Tauri and upload release + latest.json
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ runner.temp }}/tauri-signing.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          # Debe coincidir con el script en package.json ("tauri": "node …"). No incluir "build" aquí.
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: AkoeNet ${{ github.ref_name }}
          releaseBody: |
            Instalador NSIS Windows y `latest.json` para actualizaciones automáticas (Tauri updater).

            Descarga el `.exe` desde los assets de abajo. La app instalada comprobará actualizaciones según `tauri.conf.json`.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Subir alias estable akonet-desktop.exe (mismo binario, URL fija /latest/download/)
        working-directory: frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $nsis = "src-tauri/target/release/bundle/nsis"
          if (-not (Test-Path $nsis)) { throw "No existe bundle/nsis: $nsis" }
          $items = Get-ChildItem -Path $nsis -File -Filter "*_x64-setup.exe" | Where-Object { $_.Name -notmatch 'uninstall' }
          if ($items.Count -eq 0) { throw "No se encontró *_x64-setup.exe en nsis" }
          $best = $items | ForEach-Object {
            if ($_.Name -match '_(\d+)\.(\d+)\.(\d+)_') {
              [PSCustomObject]@{
                File = $_
                M = [int]$Matches[1]; N = [int]$Matches[2]; P = [int]$Matches[3]
              }
            }
          } | Sort-Object M, N, P -Descending | Select-Object -First 1
          if (-not $best) { throw "No se pudo parsear semver en los nombres de nsis" }
          Copy-Item -LiteralPath $best.File.FullName -Destination "akonet-desktop.exe" -Force
          Write-Host "Alias desde $($best.File.Name) -> akonet-desktop.exe"
          gh release upload "${{ github.ref_name }}" "akonet-desktop.exe" --clobber
